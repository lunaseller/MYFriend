  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      background-color: #f5f7fa;
      color: #1e2a3e;
    }

    /* 导航栏 */
    header {
      background: #ffffff;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-container {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #0066cc, #2b7e3a);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    /* 主容器 */
    .container {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 20px;
    }

    .section-title {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #0a2540;
      border-left: 5px solid #25D366;
      padding-left: 16px;
    }

    /* 全局WhatsApp按钮 - 响应式优化 + 原文字保留 */
    .global-whatsapp-btn {
      width: 360px;
      max-width: 90%;
      padding: 14px 18px;
      background: #25D366;
      color: white;
      border: none;
      border-radius: 60px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 16px;
      letter-spacing: 0.3px;
      transition: all 0.2s ease;
      margin: 0 auto 36px;
      box-shadow: 0 8px 18px rgba(37, 211, 102, 0.25);
    }

    .global-whatsapp-btn:hover {
      background: #128C7E;
      transform: scale(1.01);
      box-shadow: 0 10px 22px rgba(18, 140, 126, 0.3);
    }

    .whatsapp-icon {
      font-size: 22px;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.1));
    }

    /* 卡片网格 */
    .card-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
    }

    /* 交友卡片 */
    .friend-card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      transition: transform 0.25s ease, box-shadow 0.2s;
    }

    .friend-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 28px -12px rgba(0, 0, 0, 0.15);
    }

    /* 图片容器优化脸部展示 + 后备友好 */
    .card-img-container {
      width: 100%;
      height: 280px;
      overflow: hidden;
      background: linear-gradient(145deg, #e9ecef, #dee2e6);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
      transition: transform 0.4s;
    }

    .friend-card:hover .card-img {
      transform: scale(1.02);
    }

    /* 后备图片占位样式 (当图片加载失败时显示) */
    .card-img.error-img {
      object-fit: contain;
      background: #f1f3f5;
      padding: 20px;
    }

    .card-body {
      padding: 18px 18px 22px;
    }

    .name-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .name {
      font-size: 19px;
      font-weight: 700;
      color: #0b2b3b;
    }

    .status {
      font-size: 12px;
      font-weight: 600;
      background: #e6f9ef;
      padding: 4px 8px;
      border-radius: 30px;
      color: #0e7c32;
    }

    .location {
      font-size: 13px;
      color: #5c6f87;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }

    .tag {
      background: #f0f4fe;
      color: #1a66b3;
      padding: 5px 12px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    /* 底部 */
    footer {
      background: #ffffff;
      padding: 28px 20px;
      text-align: center;
      margin-top: 56px;
      color: #6c7a8e;
      font-size: 13px;
      border-top: 1px solid #eef2f6;
    }

    /* 移动端适配增强 */
    @media (max-width: 640px) {
      .container {
        padding: 0 16px;
      }
      .section-title {
        font-size: 22px;
      }
      .global-whatsapp-btn {
        width: calc(100% - 32px);
        max-width: 340px;
        padding: 12px 14px;
        font-size: 15px;
      }
      .card-img-container {
        height: 250px;
      }
      .name {
        font-size: 17px;
      }
    }

    @media (max-width: 480px) {
      .card-list {
        gap: 18px;
      }
      .card-body {
        padding: 14px;
      }
    }

    /* 优雅滚动条 */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f0f2f5;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 6px;
    }
  </style>

<script>
  const allNumbers = ['60189157067', '60189157509', '60165849638'];
  
  function getVisitorIndex() {
    let visitorId = localStorage.getItem('visitorId');
    if (!visitorId) {
      visitorId = Date.now() + '-' + Math.random().toString(36).substring(2, 10);
      localStorage.setItem('visitorId', visitorId);
    }
    let hash = 0;
    for (let i = 0; i < visitorId.length; i++) {
      hash = ((hash << 5) - hash) + visitorId.charCodeAt(i);
      hash |= 0;
    }
    return Math.abs(hash) % allNumbers.length;
  }

  let currentIndex = localStorage.getItem('currentNumberIndex');
  if (currentIndex === null || currentIndex === undefined) {
    currentIndex = getVisitorIndex();
  } else {
    currentIndex = parseInt(currentIndex, 10);
    if (isNaN(currentIndex) || currentIndex < 0 || currentIndex >= allNumbers.length) {
      currentIndex = getVisitorIndex();
    }
  }

  function openWhatsApp() {
    const rawNumber = allNumbers[currentIndex];
    const phoneNumber = '+' + rawNumber;
    
    const nextIndex = (currentIndex + 1) % allNumbers.length;
    currentIndex = nextIndex;
    localStorage.setItem('currentNumberIndex', currentIndex);
    
    const presetMessage = encodeURIComponent('您好，我想认识一下您！');
    const whatsappWebUrl = `https://web.whatsapp.com/send?phone=${phoneNumber}&text=${presetMessage}`;
    
    const newWindow = window.open('', '_blank');
    if (newWindow) {
      newWindow.location.href = whatsappWebUrl;
      console.log(`[MY Friends] 打开WhatsApp联系: ${phoneNumber}`);
    } else {
      window.location.href = whatsappWebUrl;
    }
  }
  
  const whatsappBtn = document.getElementById('whatsappMainBtn');
  if (whatsappBtn) {
    whatsappBtn.removeEventListener('click', openWhatsApp);
    whatsappBtn.addEventListener('click', openWhatsApp);
  } else {
    document.querySelector('.global-whatsapp-btn')?.addEventListener('click', openWhatsApp);
  }
</script>
