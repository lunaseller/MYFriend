<script>
// 语言切换
const langElements = document.querySelectorAll('[data-zh],[data-en],[data-ms]');
const langBtns = document.querySelectorAll('.lang-btn');
let currentLang = 'zh';

function switchLanguage(lang) {
  currentLang = lang;
  langElements.forEach(el => {
    el.textContent = el.getAttribute(`data-${lang}`);
  });
  langBtns.forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
}

langBtns.forEach(btn => btn.addEventListener('click', () => switchLanguage(btn.dataset.lang)));

// ===================== 这里是你最新的 9 个号码 =====================
const wsNumbers = [
  "60149035201",
  "60162370538",
  "60143631938",
  "60146341778",
  "60169325905",
  "60168034468",
  "60189157509",
  "60189157067",
  "60165849638"
];
// ================================================================

function getRandomWsNumber() {
  return wsNumbers[Math.floor(Math.random() * wsNumbers.length)];
}

function openWhatsApp() {
  const num = getRandomWsNumber();
  let greet = "你好";
  if (currentLang === "en") greet = "Hello";
  if (currentLang === "ms") greet = "Halo";
  window.open(`https://wa.me/${num}?text=${encodeURIComponent(greet)}`, "_blank");
}

document.getElementById("whatsappMainBtn").onclick = openWhatsApp;
</script>
