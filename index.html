  <script>
    // 号码列表（保留原有马来西亚号码）
    const allNumbers = ['60189157067', '60109633609', '60189157509', '60165849638'];
    
    // 核心：基于访客标识生成唯一初始索引，确保不同客户初始号码不同
    function getVisitorIndex() {
      // 生成简单的访客唯一标识（基于时间+随机数，模拟不同客户）
      const visitorId = localStorage.getItem('visitorId') || Date.now() + '-' + Math.random();
      localStorage.setItem('visitorId', visitorId);
      
      // 根据访客ID生成固定的初始索引（确保同一客户每次打开初始索引一致）
      let hash = 0;
      for (let i = 0; i < visitorId.length; i++) {
        hash = visitorId.charCodeAt(i) + ((hash << 5) - hash);
      }
      return Math.abs(hash) % allNumbers.length;
    }

    // 初始化当前索引：不同客户初始索引不同，同一客户保持一致
    let currentIndex = localStorage.getItem('currentNumberIndex') || getVisitorIndex();
    currentIndex = parseInt(currentIndex);

    // WhatsApp跳转函数：点击一次切换一个号码，不同客户初始号码不同
    function openWhatsApp() {
      // 获取当前要使用的号码
      const phoneNumber = allNumbers[currentIndex];
      
      // 切换到下一个号码并保存（同一客户下次点击用新号码）
      currentIndex = (currentIndex + 1) % allNumbers.length;
      localStorage.setItem('currentNumberIndex', currentIndex);
      
      console.log('本次给该客户分配的号码：', phoneNumber, '，下次将分配：', allNumbers[currentIndex]);
      
      // 智能适配跳转：电脑端→网页版，移动端→APP
      const isWebVersion = /Windows|Mac|Linux/.test(navigator.platform);
      let url;

      if (isWebVersion) {
        url = `https://web.whatsapp.com/send?phone=${phoneNumber}&text=您好，我想认识一下您！`;
      } else {
        url = `whatsapp://send?phone=${phoneNumber}&text=您好，我想认识一下您！`;
      }
      
      window.open(url, '_blank');
    }
  </script>
