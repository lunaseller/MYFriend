    <meta charset="UTF-8">

    <title>马来西亚交友 - 同城交友 · 轻松聊天</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #afdcec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 浮动气泡动画 */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            animation: float 8s infinite ease-in-out;
            z-index: 0;
        }

        @keyframes float {
            0%,100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
        }

        /* 主卡片 */
        .friend-card {
            background: white;
            max-width: 480px;
            width: 100%;
            border-radius: 30px;
            padding: 50px 35px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            position: relative;
            z-index: 1;
            animation: fadeIn 1.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 头像 */
        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff9a9e, #f8b1ff);
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 45px;
        }

        .title {
            font-size: 30px;
            color: #222;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        /* 标签 */
        .info-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
        }

        .tag {
            background: #f0f4ff;
            color: #446df6;
            padding: 7px 15px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
        }

        /* 优势说明 */
        .advantage-list {
            text-align: left;
            margin: 30px 0;
            padding-left: 10px;
        }

        .advantage-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            color: #555;
            font-size: 15px;
        }

        .advantage-item i {
            color: #25D366;
            font-size: 16px;
        }

        /* 聊天按钮 */
        .chat-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #25D366;
            color: white;
            font-size: 18px;
            font-weight: 600;
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px 15px rgba(37, 211, 102, 0.3);
            margin-top: 10px;
        }

        .chat-btn:hover {
            background: #128C7E;
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.4);
        }

        .tip {
            margin-top: 18px;
            font-size: 14px;
            color: #888;
        }

        .count {
            color: #ff6b9d;
            font-weight: 600;
        }

        .footer-text {
            margin-top: 35px;
            font-size: 13px;
            color: #999;
            border-top: 1px solid #f1f1f1;
            padding-top: 20px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<!-- 动态装饰气泡 -->
<div class="bubble" style="width:60px;height:60px;top:10%;left:10%;animation-delay:0s"></div>
<div class="bubble" style="width:40px;height:40px;top:25%;right:12%;animation-delay:1s"></div>
<div class="bubble" style="width:80px;height:80px;bottom:15%;left:15%;animation-delay:2s"></div>
<div class="bubble" style="width:50px;height:50px;bottom:25%;right:10%;animation-delay:3s"></div>
<div class="bubble" style="width:35px;height:35px;top:45%;left:25%;animation-delay:1.5s"></div>

<div class="friend-card">
    <div class="avatar">
        <i class="fas fa-heart"></i>
    </div>
    
    <h1 class="title">马来西亚交友</h1>
    <p class="subtitle">同城交友、聊天互动、真诚相伴<br>马来西亚本地优质交友平台，一键开启轻松聊天</p>

    <!-- 标签 -->
    <div class="info-tags">
        <span class="tag">同城交友</span>
        <span class="tag">实时聊天</span>
        <span class="tag">安全可靠</span>
        <span class="tag">简单便捷</span>
        <span class="tag">马来西亚本地</span>
    </div>

    <!-- 平台优势（已删除：无需注册） -->
    <div class="advantage-list">
        <div class="advantage-item"><i class="fas fa-check-circle"></i> 全马来西亚用户在线，真实可靠</div>
        <div class="advantage-item"><i class="fas fa-check-circle"></i> 安全私密，保护个人隐私</div>
        <div class="advantage-item"><i class="fas fa-check-circle"></i> 24小时在线，随时认识新朋友</div>
    </div>

    <!-- 你要求的联系按钮 -->
    <button class="chat-btn" id="contactButton">
        <i class="fab fa-whatsapp"></i> 立即开始聊天
    </button>

    <p class="tip">已有 <span class="count">10000+</span> 马来西亚用户加入 | 3秒后自动跳转...</p>

    <p class="footer-text">© 马来西亚交友平台<br>安全交友 · 文明交流 · 同城相伴</p>
</div>

<script>
    // ===================== 配置区 =====================
    const WHATSAPP_ACCOUNTS = [
        "60189157509",
        "60189157067",
        "60109633609",
        "60165849638",
        "60143631938",
        "60162370538",
        "60149035201",
        "60169325905",
        "60146341778"
    ];
    const DEFAULT_MESSAGE = "你好！";
    // ====================================================

    // 账号轮询
    function getNextAccount() {
        const key = "wa_last_index";
        let lastIndex = parseInt(localStorage.getItem(key)) || -1;
        let nextIndex = (lastIndex + 1) % WHATSAPP_ACCOUNTS.length;
        localStorage.setItem(key, nextIndex);
        return WHATSAPP_ACCOUNTS[nextIndex];
    }

    // 跳转WhatsApp
    function goToChat() {
        const phone = getNextAccount();
        const msg = encodeURIComponent(DEFAULT_MESSAGE);
        const waUrl = `https://wa.me/${phone}?text=${msg}`;
        window.open(waUrl, "_blank");
    }

    // ===================== 修复后的点击代码 =====================
    document.getElementById('contactButton').addEventListener('click', function() {
        goToChat();
    }, false);

    // 3秒自动跳转
    setTimeout(() => {
        goToChat();
    }, 3000);
</script>

</body>
