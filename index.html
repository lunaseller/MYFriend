  <script>
    (function() {
      // 动态年份
      document.getElementById('currentYear').textContent = new Date().getFullYear();

      // WhatsApp 号码池
      const allNumbers = ['60189157067', '60189157509', '60165849638'];
      
      // 访客唯一标识 (用于固定初始号码)
      function getVisitorId() {
        let visitorId = localStorage.getItem('visitorId');
        if (!visitorId) {
          visitorId = Date.now() + '-' + Math.random().toString(36).substring(2, 10);
          localStorage.setItem('visitorId', visitorId);
        }
        return visitorId;
      }

      function computeInitialIndex(visitorId) {
        let hash = 0;
        for (let i = 0; i < visitorId.length; i++) {
          hash = visitorId.charCodeAt(i) + ((hash << 5) - hash);
        }
        return Math.abs(hash) % allNumbers.length;
      }

      let currentIndex = localStorage.getItem('currentNumberIndex');
      if (currentIndex === null) {
        const visitorId = getVisitorId();
        currentIndex = computeInitialIndex(visitorId);
        localStorage.setItem('currentNumberIndex', currentIndex);
      } else {
        currentIndex = parseInt(currentIndex, 10);
      }

      // 点击跳转 WhatsApp
      window.handleWhatsAppClick = function() {
        const btn = document.getElementById('whatsappBtn');
        btn.classList.add('loading');
        btn.textContent = '⏳ 正在跳转...';
        
        const phoneNumber = '+' + allNumbers[currentIndex];
        const message = encodeURIComponent('您好，我想认识一下您！');
        
        // 设备判断：移动端用 wa.me，桌面端用 WhatsApp Web
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        let targetUrl = isMobile 
          ? `https://wa.me/${phoneNumber}?text=${message}` 
          : `https://web.whatsapp.com/send?phone=${phoneNumber}&text=${message}`;

        // 轮换到下一个号码
        currentIndex = (currentIndex + 1) % allNumbers.length;
        localStorage.setItem('currentNumberIndex', currentIndex);

        // 跳转（防弹窗拦截）
        const newWindow = window.open('', '_blank');
        if (newWindow) {
          newWindow.location.href = targetUrl;
        } else {
          window.location.href = targetUrl;
        }

        // TikTok 自定义事件：仅回传点击动作
        if (typeof ttq !== 'undefined' && ttq.track) {
          ttq.track('ContactWhatsApp');
          console.log('[TikTok] ContactWhatsApp event sent');
        }

        // 恢复按钮状态
        setTimeout(() => {
          btn.classList.remove('loading');
          btn.innerHTML = '<span class="whatsapp-icon">💬</span> 开始 WhatsApp 聊天';
        }, 800);
      };

      // 预连接优化
      if (document.head) {
        ['https://web.whatsapp.com', 'https://wa.me'].forEach(href => {
          const link = document.createElement('link');
          link.rel = 'preconnect';
          link.href = href;
          document.head.appendChild(link);
        });
      }
    })();
  </script>
