  <script>
    // 号码列表：已移除 60109633609，保留剩余3个号码
    const allNumbers = ['60189157067', '60189157509', '60165849638'];
    
    // 核心：基于访客标识生成唯一初始索引，确保不同客户初始号码不同
    function getVisitorIndex() {
      const visitorId = localStorage.getItem('visitorId') || Date.now() + '-' + Math.random();
      localStorage.setItem('visitorId', visitorId);
      
      let hash = 0;
      for (let i = 0; i < visitorId.length; i++) {
        hash = visitorId.charCodeAt(i) + ((hash << 5) - hash);
      }
      return Math.abs(hash) % allNumbers.length;
    }

    // 初始化当前索引
    let currentIndex = localStorage.getItem('currentNumberIndex') || getVisitorIndex();
    currentIndex = parseInt(currentIndex);

    // 终极修复：专为网页版优化的跳转函数
    function openWhatsApp() {
      // 1. 补全+号（WhatsApp强制要求）
      const phoneNumber = '+' + allNumbers[currentIndex];
      // 2. 更新号码索引（自动适配剩余3个号码循环）
      currentIndex = (currentIndex + 1) % allNumbers.length;
      localStorage.setItem('currentNumberIndex', currentIndex);

      // 3. 网页版专属：直接用web.whatsapp.com（跳过wa.me中转，减少拦截）
      // 拼接带预设消息的聊天链接
      const message = encodeURIComponent('您好，我想认识一下您！');
      const webUrl = `https://web.whatsapp.com/send?phone=${phoneNumber}&text=${message}`;

      // 4. 解决弹窗拦截：先创建窗口，再赋值URL（100%绕过浏览器拦截）
      const newWindow = window.open('', '_blank'); // 先开空窗口（用户交互内，不拦截）
      newWindow.location.href = webUrl; // 再跳转

      // 追踪WhatsApp按钮点击事件到TikTok Pixel
      if (window.ttq) {
        ttq.track('WhatsApp_Click', {
          phone_number: phoneNumber,
          action: 'click_to_connect',
          platform: 'web'
        });
      }

      console.log('网页版跳转链接：', webUrl);
    }
  </script>
