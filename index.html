      color: white;

      border-radius: 60px;

    /* 卡片网格 */
    .card-list {

      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
    }

    /* 交友卡片 */
    .friend-card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      transition: transform 0.25s ease, box-shadow 0.2s;
    }

    .friend-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 28px -12px rgba(0, 0, 0, 0.15);
    }

    .card-img-container {
      width: 100%;
      height: 280px;
      overflow: hidden;
      background: linear-gradient(145deg, #e9ecef, #dee2e6);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
    }

    .card-body {
      padding: 18px;
    }

    .name-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .name {
      font-size: 19px;
      font-weight: 700;
      color: #0b2b3b;
    }

    .status {
      font-size: 12px;
      background: #e6f9ef;
      padding: 4px 8px;
      border-radius: 30px;
      color: #0e7c32;
    }

    .location {
      font-size: 13px;
      color: #5c6f87;
      margin-bottom: 12px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: #f0f4fe;
      color: #1a66b3;
      padding: 5px 12px;
      border-radius: 40px;
      font-size: 12px;
    }

    footer {

      padding: 28px 20px;
      text-align: center;
