    .friend-card:hover {
      transform: translateY(-5px);

    .card-img-container {
      width: 100%;
      height: 280px;
      overflow: hidden;
      background: linear-gradient(145deg, #e9ecef, #dee2e6);
      display: flex;
      align-items: center;
      justify-content: center;

    .card-img {

      height: 100%;
      object-fit: cover;
      object-position: center center; /* 重点：居中显示，优先展示脸部 */

];

// 2. 随机获取一个WS号码的函数
function getRandomWsNumber() {
  const randomIndex = Math.floor(Math.random() * wsNumbers.length);
  return wsNumbers[randomIndex];
}

// 3. 点击按钮打开随机WS号码 + 自动带入进线语“你好”
function openWhatsApp() {
  const randomNumber = getRandomWsNumber();
  const wsUrl = `https://wa.me/${randomNumber}?text=你好`;
  window.open(wsUrl, "_blank");
}
